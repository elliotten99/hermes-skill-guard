version: 2
updates:
  # Python dependencies (project lives in the hermes-skill-guard/ subdirectory)
  - package-ecosystem: "pip"
    directory: "/hermes-skill-guard"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "python"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/hermes-skill-guard"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
      - "github-actions"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/hermes-skill-guard/docker"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(docker)"
    labels:
      - "dependencies"
      - "docker"
