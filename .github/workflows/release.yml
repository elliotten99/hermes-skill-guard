name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7

  test-built-package:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install development dependencies
        run: uv sync --locked --extra dev

      - name: Run ruff check
        run: uv run ruff check src tests

      - name: Run ruff format check
        run: uv run ruff format --check src tests

      - name: Run mypy
        run: uv run mypy src tests

      - name: Run tests with coverage
        run: uv run pytest --cov=hermes_skill_guard --cov-report=term --cov-fail-under=85

      - name: Run pip-audit
        run: uv run pip-audit --skip-editable

      - name: Run bandit
        run: uv run bandit -r src/ -c pyproject.toml

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Verify package contents
        env:
          HSG_DIST_DIR: ${{ github.workspace }}/dist
        run: |
          uv run pytest tests/integration/test_package_verification.py -v
          uv run python -m hermes_skill_guard verify package dist/*.whl dist/*.tar.gz

      - name: Test wheel installation
        run: |
          python -m pip install dist/*.whl
          hermes-skill-guard --help

      - name: Test sdist installation
        run: |
          python -m pip uninstall -y hermes-skill-guard
          python -m pip install dist/*.tar.gz
          hermes-skill-guard --help

  publish-to-pypi:
    needs: [build, test-built-package]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/hermes-skill-guard
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: publish-to-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
